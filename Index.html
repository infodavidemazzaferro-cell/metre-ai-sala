<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metre AI — Mappa Sala</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #F4ECDD; color: #2A2018; }
header { background: #2F3A2A; color: #fff; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
h1 { font-size: 20px; font-weight: 700; }
.turni { display: flex; gap: 8px; }
.btn-turno { background: rgba(255,255,255,.2); color: #fff; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
.btn-turno.active { background: #C2913B; }
.sala { padding: 20px; display: flex; flex-wrap: wrap; gap: 12px; }
.zona-label { width: 100%; font-size: 11px; font-weight: 700; color: #8A7E6C; text-transform: uppercase; letter-spacing: .1em; margin-top: 8px; }
.tavolo { width: 80px; height: 80px; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border: 2px solid; font-size: 13px; font-weight: 700; transition: transform .15s; }
.tavolo:hover { transform: scale(1.05); }
.tavolo.libero { background: #D4E4CE; border-color: #42513C; color: #42513C; }
.tavolo.occupato { background: #F5D5C8; border-color: #BC5A37; color: #BC5A37; }
.tavolo.non-disponibile { background: #EBEBEB; border-color: #9A9A9A; color: #9A9A9A; }
.posti { font-size: 11px; font-weight: 400; margin-top: 2px; }
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 50; align-items: center; justify-content: center; padding: 20px; }
.modal.open { display: flex; }
.modal-box { background: #FBF6EC; border-radius: 16px; padding: 24px; width: 100%; max-width: 340px; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
.field { margin-bottom: 12px; }
.field label { font-size: 12px; font-weight: 600; color: #42513C; display: block; margin-bottom: 4px; }
.field input, .field select { width: 100%; padding: 9px 12px; border: 1px solid #DCCDB2; border-radius: 8px; font-size: 14px; font-family: inherit; background: #F4ECDD; }
.btns { display: flex; gap: 8px; margin-top: 16px; }
.btn { flex: 1; padding: 10px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-cancel { background: #DCCDB2; color: #2A2018; }
.btn-save { background: #42513C; color: #fff; }
.btn-free { background: #BC5A37; color: #fff; }
.stato-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-bottom: 12px; }
</style>
</head>
<body>

<header>
  <h1>🍽️ Mappa Sala</h1>
  <div class="turni">
    <button class="btn-turno active" onclick="setTurno('19:30')">🕐 1° Turno 19:30</button>
    <button class="btn-turno" onclick="setTurno('21:30')">🕐 2° Turno 21:30</button>
  </div>
</header>

<div class="sala" id="sala"></div>

<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">Tavolo</div>
    <div id="modal-content"></div>
  </div>
</div>

<script>
const TAVOLI = [
  {id:"T1",posti:2,zona:"Sala"},{id:"T2",posti:2,zona:"Sala",nonDisp:true},
  {id:"T3",posti:4,zona:"Sala"},{id:"T4",posti:4,zona:"Sala"},
  {id:"T5",posti:2,zona:"Sala"},{id:"T6",posti:4,zona:"Sala"},
  {id:"T7",posti:4,zona:"Sala"},{id:"T8",posti:2,zona:"Sala"},
  {id:"T9",posti:4,zona:"Sala"},{id:"T10",posti:4,zona:"Sala"},
  {id:"T11",posti:2,zona:"Sala"},{id:"T12",posti:4,zona:"Sala"},
  {id:"T13",posti:4,zona:"Sala"},{id:"T15",posti:2,zona:"Sala"},
  {id:"T19",posti:4,zona:"Saletta"},{id:"T20",posti:2,zona:"Saletta"},
  {id:"T21",posti:4,zona:"Saletta"},{id:"T22",posti:4,zona:"Saletta"},
  {id:"T23",posti:2,zona:"Saletta"},{id:"T24",posti:4,zona:"Saletta"},
  {id:"T25",posti:4,zona:"Saletta"},{id:"T26",posti:2,zona:"Saletta"},
  {id:"T27",posti:4,zona:"Saletta"},{id:"T28",posti:4,zona:"Saletta"},
  {id:"T29",posti:2,zona:"Saletta"},{id:"T30",posti:4,zona:"Saletta"},
  {id:"T31",posti:4,zona:"Saletta"},
];

let turno = "19:30";
let prenotazioni = {};

function setTurno(t) {
  turno = t;
  document.querySelectorAll('.btn-turno').forEach((b,i) => {
    b.classList.toggle('active', (i===0&&t==='19:30')||(i===1&&t==='21:30'));
  });
  renderSala();
}

function renderSala() {
  const sala = document.getElementById('sala');
  sala.innerHTML = '';
  let zonaCorrente = '';
  TAVOLI.forEach(t => {
    if(t.zona !== zonaCorrente) {
      zonaCorrente = t.zona;
      const lbl = document.createElement('div');
      lbl.className = 'zona-label';
      lbl.textContent = t.zona;
      sala.appendChild(lbl);
    }
    const p = prenotazioni[turno]?.[t.id];
    const div = document.createElement('div');
    div.className = 'tavolo ' + (t.nonDisp ? 'non-disponibile' : p ? 'occupato' : 'libero');
    div.innerHTML = `<span>${t.id}</span><span class="posti">${t.posti}p</span>${p ? '<span style="font-size:9px;margin-top:2px">'+p.nome.split(' ')[0]+'</span>' : ''}`;
    div.onclick = () => apriModal(t, p);
    sala.appendChild(div);
  });
}

function apriModal(t, p) {
  const modal = document.getElementById('modal');
  const title = document.getElementById('modal-title');
  const content = document.getElementById('modal-content');
  title.textContent = t.id + ' — ' + t.posti + ' posti — ' + t.zona;
  
  if(t.nonDisp) {
    content.innerHTML = '<p style="color:#9A9A9A;margin-bottom:16px">Tavolo non disponibile</p><button class="btn btn-cancel" onclick="chiudiModal()">Chiudi</button>';
  } else if(p) {
    const stati = ['Prenotato','Arrivato','Completato','No-show','Cancellato'];
    const colori = {'Prenotato':'#2E5F8A','Arrivato':'#4CAF50','Completato':'#42513C','No-show':'#9A9A9A','Cancellato':'#BC5A37'};
    const c = colori[p.stato] || '#42513C';
    content.innerHTML = `
      <span class="stato-badge" style="background:${c}22;color:${c};border:1px solid ${c}44">${p.stato}</span>
      <div class="field"><label>Nome</label><input id="e-nome" value="${p.nome}"></div>
      <div class="field"><label>Coperti</label><input id="e-cop" type="number" value="${p.coperti}"></div>
      <div class="field"><label>Telefono</label><input id="e-tel" value="${p.telefono||''}"></div>
      <div class="field"><label>Note</label><input id="e-note" value="${p.note||''}"></div>
      <div class="field"><label>Stato</label><select id="e-stato">${stati.map(s=>`<option${s===p.stato?' selected':''}>${s}</option>`).join('')}</select></div>
      <div class="btns">
        <button class="btn btn-free" onclick="liberaTavolo('${t.id}')">Libera</button>
        <button class="btn btn-cancel" onclick="chiudiModal()">Annulla</button>
        <button class="btn btn-save" onclick="salvaMod('${t.id}')">Salva</button>
      </div>`;
  } else {
    content.innerHTML = `
      <div class="field"><label>Nome cliente *</label><input id="n-nome" placeholder="Es. Rossi Mario"></div>
      <div class="field"><label>Coperti *</label><input id="n-cop" type="number" min="1" max="${t.posti+2}" value="${t.posti}"></div>
      <div class="field"><label>Telefono</label><input id="n-tel" placeholder="333 1234567"></div>
      <div class="field"><label>Note</label><input id="n-note" placeholder="Allergie, occasione..."></div>
      <div class="btns">
        <button class="btn btn-cancel" onclick="chiudiModal()">Annulla</button>
        <button class="btn btn-save" onclick="prenota('${t.id}')">Prenota</button>
      </div>`;
  }
  modal.classList.add('open');
}

function chiudiModal() { document.getElementById('modal').classList.remove('open'); }

function prenota(id) {
  const nome = document.getElementById('n-nome').value.trim();
  const cop = document.getElementById('n-cop').value;
  if(!nome) { alert('Inserisci il nome'); return; }
  if(!prenotazioni[turno]) prenotazioni[turno] = {};
  prenotazioni[turno][id] = { nome, coperti: parseInt(cop), telefono: document.getElementById('n-tel').value, note: document.getElementById('n-note').value, stato: 'Prenotato' };
  chiudiModal(); renderSala();
}

function salvaMod(id) {
  prenotazioni[turno][id] = { ...prenotazioni[turno][id], nome: document.getElementById('e-nome').value, coperti: parseInt(document.getElementById('e-cop').value), telefono: document.getElementById('e-tel').value, note: document.getElementById('e-note').value, stato: document.getElementById('e-stato').value };
  chiudiModal(); renderSala();
}

function liberaTavolo(id) {
  delete prenotazioni[turno][id];
  chiudiModal(); renderSala();
}

document.getElementById('modal').onclick = function(e) { if(e.target===this) chiudiModal(); };
renderSala();
</script>
</body>
</html>
