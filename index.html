<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metre AI — Mappa Sala</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #F4ECDD; color: #2A2018; height: 100vh; display: flex; flex-direction: column; }
header { background: #2F3A2A; color: #fff; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; flex-shrink: 0; }
h1 { font-size: 18px; font-weight: 700; }
.turni { display: flex; gap: 8px; }
.btn-turno { background: rgba(255,255,255,.2); color: #fff; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
.btn-turno.active { background: #C2913B; }
.toolbar { background: #FBF6EC; border-bottom: 1px solid #DCCDB2; padding: 10px 18px; display: flex; gap: 8px; align-items: center; flex-shrink: 0; flex-wrap: wrap; }
.btn-tool { background: #2F3A2A; color: #fff; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
.btn-tool.edit-mode { background: #BC5A37; }
.btn-tool.secondary { background: #DCCDB2; color: #2A2018; }
.canvas-wrap { flex: 1; overflow: auto; position: relative; }
#canvas { position: relative; width: 1400px; height: 900px; background: #E8DCC8; background-image: radial-gradient(circle, #C8B89A 1px, transparent 1px); background-size: 40px 40px; }
.zona-bg { position: absolute; border-radius: 14px; border: 2px dashed; opacity: .5; pointer-events: none; }
.zona-label-map { position: absolute; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; opacity: .8; pointer-events: none; }
.tavolo { position: absolute; width: 110px; height: 110px; border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 3px solid; font-size: 15px; font-weight: 800; transition: box-shadow .15s; user-select: none; touch-action: none; }
.tavolo.libero { background: #D4E4CE; border-color: #42513C; color: #42513C; }
.tavolo.occupato { background: #F5D5C8; border-color: #BC5A37; color: #BC5A37; }
.tavolo.non-disp { background: #EBEBEB; border-color: #9A9A9A; color: #9A9A9A; }
.tavolo:active { box-shadow: 0 8px 24px rgba(0,0,0,.3); transform: scale(1.05); }
.posti { font-size: 12px; font-weight: 400; margin-top: 3px; }
.nome-breve { font-size: 11px; margin-top: 2px; opacity: .85; }
.stats { background: #FBF6EC; border-top: 1px solid #DCCDB2; padding: 10px 18px; display: flex; gap: 20px; flex-shrink: 0; flex-wrap: wrap; }
.stat { font-size: 13px; }
.stat strong { font-size: 18px; font-weight: 800; }
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
.modal.open { display: flex; }
.modal-box { background: #FBF6EC; border-radius: 16px; padding: 22px; width: 100%; max-width: 340px; max-height: 90vh; overflow-y: auto; }
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 14px; }
.field { margin-bottom: 10px; }
.field label { font-size: 12px; font-weight: 600; color: #42513C; display: block; margin-bottom: 3px; }
.field input, .field select { width: 100%; padding: 10px 12px; border: 1px solid #DCCDB2; border-radius: 8px; font-size: 15px; font-family: inherit; background: #F4ECDD; }
.btns { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
.btn { flex: 1; padding: 11px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; min-width: 80px; }
.btn-cancel { background: #DCCDB2; color: #2A2018; }
.btn-save { background: #42513C; color: #fff; }
.btn-free { background: #BC5A37; color: #fff; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-bottom: 10px; }
</style>
</head>
<body>

<header>
  <h1>🍽️ Metre AI — Mappa Sala</h1>
  <div class="turni">
    <button class="btn-turno active" onclick="setTurno('19:30')">🕐 1° 19:30</button>
    <button class="btn-turno" onclick="setTurno('21:30')">🕐 2° 21:30</button>
  </div>
</header>

<div class="toolbar">
  <button class="btn-tool" id="btn-edit" onclick="toggleEdit()">✏️ Modifica layout</button>
  <span id="edit-hint" style="font-size:13px;color:#8A7E6C;display:none">✋ Tieni premuto e trascina</span>
  <button class="btn-tool secondary" id="btn-save-layout" onclick="saveLayout()" style="display:none">💾 Salva layout</button>
</div>

<div class="canvas-wrap">
  <div id="canvas"></div>
</div>

<div class="stats" id="stats"></div>

<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const GRID = 20;

const DEFAULT_TAVOLI = [
  {id:"T1",posti:2,zona:"Sala",x:40,y:80},
  {id:"T2",posti:2,zona:"Sala",x:180,y:80,nonDisp:true},
  {id:"T3",posti:4,zona:"Sala",x:320,y:80},
  {id:"T4",posti:4,zona:"Sala",x:460,y:80},
  {id:"T5",posti:2,zona:"Sala",x:600,y:80},
  {id:"T6",posti:4,zona:"Sala",x:740,y:80},
  {id:"T7",posti:4,zona:"Sala",x:880,y:80},
  {id:"T8",posti:2,zona:"Sala",x:40,y:220},
  {id:"T9",posti:4,zona:"Sala",x:180,y:220},
  {id:"T10",posti:4,zona:"Sala",x:320,y:220},
  {id:"T11",posti:2,zona:"Sala",x:460,y:220},
  {id:"T12",posti:4,zona:"Sala",x:600,y:220},
  {id:"T13",posti:4,zona:"Sala",x:740,y:220},
  {id:"T15",posti:2,zona:"Sala",x:880,y:220},
  {id:"T19",posti:4,zona:"Saletta",x:40,y:440},
  {id:"T20",posti:2,zona:"Saletta",x:180,y:440},
  {id:"T21",posti:4,zona:"Saletta",x:320,y:440},
  {id:"T22",posti:4,zona:"Saletta",x:460,y:440},
  {id:"T23",posti:2,zona:"Saletta",x:600,y:440},
  {id:"T24",posti:4,zona:"Saletta",x:740,y:440},
  {id:"T25",posti:4,zona:"Saletta",x:880,y:440},
  {id:"T26",posti:2,zona:"Saletta",x:40,y:580},
  {id:"T27",posti:4,zona:"Saletta",x:180,y:580},
  {id:"T28",posti:4,zona:"Saletta",x:320,y:580},
  {id:"T29",posti:2,zona:"Saletta",x:460,y:580},
  {id:"T30",posti:4,zona:"Saletta",x:600,y:580},
  {id:"T31",posti:4,zona:"Saletta",x:740,y:580},
];

const ZONE_COLORS = {
  "Sala":    { bg: "#E8F0E8", border: "#4A8A5A", text: "#2A5A2A" },
  "Saletta": { bg: "#E8EAF0", border: "#4A5A8A", text: "#1A2A6A" },
};

const STATI_COLORS = {
  "Prenotato":"#2E5F8A","Arrivato":"#4CAF50",
  "Completato":"#42513C","No-show":"#9A9A9A","Cancellato":"#BC5A37"
};

let turno = "19:30";
let editMode = false;
let tavoli = JSON.parse(localStorage.getItem('metre_tavoli') || 'null') || DEFAULT_TAVOLI;
let prenotazioni = JSON.parse(localStorage.getItem('metre_pren') || '{}');
let dragging = null, dragOffX = 0, dragOffY = 0;

function snap(v) { return Math.round(v / GRID) * GRID; }

function setTurno(t) {
  turno = t;
  document.querySelectorAll('.btn-turno').forEach((b,i) => {
    b.classList.toggle('active',(i===0&&t==='19:30')||(i===1&&t==='21:30'));
  });
  render();
}

function toggleEdit() {
  editMode = !editMode;
  const btn = document.getElementById('btn-edit');
  const hint = document.getElementById('edit-hint');
  const saveBtn = document.getElementById('btn-save-layout');
  btn.textContent = editMode ? '✓ Esci editor' : '✏️ Modifica layout';
  btn.className = 'btn-tool' + (editMode ? ' edit-mode' : '');
  hint.style.display = editMode ? 'inline' : 'none';
  saveBtn.style.display = editMode ? 'inline-block' : 'none';
  render();
}

function saveLayout() {
  localStorage.setItem('metre_tavoli', JSON.stringify(tavoli));
  alert('✅ Layout salvato!');
}

function savePren() {
  localStorage.setItem('metre_pren', JSON.stringify(prenotazioni));
}

function getTavoloPren(id) {
  return prenotazioni[turno] && prenotazioni[turno][id];
}

function render() {
  const canvas = document.getElementById('canvas');
  canvas.innerHTML = '';

  const zone = {};
  tavoli.forEach(t => {
    if(!zone[t.zona]) zone[t.zona] = {minX:9999,minY:9999,maxX:0,maxY:0};
    const z = zone[t.zona];
    z.minX = Math.min(z.minX, t.x - 20);
    z.minY = Math.min(z.minY, t.y - 36);
    z.maxX = Math.max(z.maxX, t.x + 130);
    z.maxY = Math.max(z.maxY, t.y + 130);
  });

  Object.entries(zone).forEach(([nome, z]) => {
    const zc = ZONE_COLORS[nome] || {bg:"#F0F0F0",border:"#999",text:"#333"};
    const bg = document.createElement('div');
    bg.className = 'zona-bg';
    bg.style.cssText = `left:${z.minX}px;top:${z.minY}px;width:${z.maxX-z.minX}px;height:${z.maxY-z.minY}px;background:${zc.bg};border-color:${zc.border};`;
    canvas.appendChild(bg);
    const lbl = document.createElement('div');
    lbl.className = 'zona-label-map';
    lbl.style.cssText = `left:${z.minX+12}px;top:${z.minY+10}px;color:${zc.text};`;
    lbl.textContent = nome.toUpperCase();
    canvas.appendChild(lbl);
  });

  tavoli.forEach(t => {
    const p = getTavoloPren(t.id);
    const div = document.createElement('div');
    let cls = 'tavolo ';
    if(t.nonDisp) cls += 'non-disp';
    else if(p) cls += 'occupato';
    else cls += 'libero';
    div.className = cls;
    div.style.cssText = `left:${t.x}px;top:${t.y}px;cursor:${editMode?'grab':'pointer'};`;
    div.innerHTML = `<span>${t.id}</span><span class="posti">${t.posti}p</span>${p&&!t.nonDisp?`<span class="nome-breve">${p.nome.split(' ')[0]}</span>`:''}`;

    if(editMode) {
      div.addEventListener('touchstart', e => {
        e.preventDefault();
        e.stopPropagation();
        const touch = e.touches[0];
        const canvas = document.getElementById('canvas');
        const rect = canvas.getBoundingClientRect();
        const wrap = canvas.parentElement;
        dragging = t.id;
        dragOffX = touch.clientX - rect.left + wrap.scrollLeft - t.x;
        dragOffY = touch.clientY - rect.top + wrap.scrollTop - t.y;
      }, {passive:false});
      div.addEventListener('mousedown', e => {
        e.preventDefault();
        const canvas = document.getElementById('canvas');
        const rect = canvas.getBoundingClientRect();
        const wrap = canvas.parentElement;
        dragging = t.id;
        dragOffX = e.clientX - rect.left + wrap.scrollLeft - t.x;
        dragOffY = e.clientY - rect.top + wrap.scrollTop - t.y;
      });
    } else {
      div.addEventListener('click', () => openModal(t.id));
    }
    canvas.appendChild(div);
  });

  document.getElementById('canvas').addEventListener('touchmove', e => {
    if(!dragging) return;
    e.preventDefault();
    const touch = e.touches[0];
    const canvas = document.getElementById('canvas');
    const rect = canvas.getBoundingClientRect();
    const wrap = canvas.parentElement;
    const nx = snap(touch.clientX - rect.left + wrap.scrollLeft - dragOffX);
    const ny = snap(touch.clientY - rect.top + wrap.scrollTop - dragOffY);
    const tv = tavoli.find(x=>x.id===dragging);
    tv.x = Math.max(0, Math.min(1280, nx));
    tv.y = Math.max(0, Math.min(780, ny));
    render();
  }, {passive:false});

  renderStats();
}

document.addEventListener('mouseup', () => dragging = null);
document.addEventListener('touchend', () => dragging = null);
document.addEventListener('mousemove', e => {
  if(!dragging || !editMode) return;
  const canvas = document.getElementById('canvas');
  const rect = canvas.getBoundingClientRect();
  const wrap = canvas.parentElement;
  const nx = snap(e.clientX - rect.left + wrap.scrollLeft - dragOffX);
  const ny = snap(e.clientY - rect.top + wrap.scrollTop - dragOffY);
  const tv = tavoli.find(x=>x.id===dragging);
  tv.x = Math.max(0, Math.min(1280, nx));
  tv.y = Math.max(0, Math.min(780, ny));
  render();
});

function renderStats() {
  const liberi = tavoli.filter(t=>!t.nonDisp&&!getTavoloPren(t.id)).length;
  const occupati = tavoli.filter(t=>!t.nonDisp&&getTavoloPren(t.id)).length;
  const coperti = Object.values(prenotazioni[turno]||{}).reduce((s,p)=>s+(p.coperti||0),0);
  document.getElementById('stats').innerHTML = `
    <div class="stat"><strong style="color:#42513C">${liberi}</strong> Liberi</div>
    <div class="stat"><strong style="color:#BC5A37">${occupati}</strong> Occupati</div>
    <div class="stat"><strong style="color:#C2913B">${coperti}</strong> Coperti</div>
    <div class="stat"><strong>${tavoli.length}</strong> Totali</div>
  `;
}

function openModal(id) {
  if(editMode) return;
  const t = tavoli.find(x=>x.id===id);
  const p = getTavoloPren(id);
  const title = document.getElementById('modal-title');
  const body = document.getElementById('modal-body');
  title.textContent = `${t.id} — ${t.posti}p — ${t.zona}`;

  if(t.nonDisp) {
    body.innerHTML = `<p style="color:#9A9A9A;margin-bottom:14px">Tavolo non disponibile</p><button class="btn btn-cancel" onclick="closeModal()">Chiudi</button>`;
  } else if(p) {
    const c = STATI_COLORS[p.stato]||'#42513C';
    body.innerHTML = `
      <span class="badge" style="background:${c}22;color:${c};border:1px solid ${c}44">${p.stato}</span>
      <div class="field"><label>Nome</label><input id="e-nome" value="${p.nome}"></div>
      <div class="field"><label>Coperti</label><input id="e-cop" type="number" value="${p.coperti}"></div>
      <div class="field"><label>Telefono</label><input id="e-tel" value="${p.telefono||''}"></div>
      <div class="field"><label>Note</label><input id="e-note" value="${p.note||''}"></div>
      <div class="field"><label>Stato</label><select id="e-stato">
        ${['Prenotato','Arrivato','Completato','No-show','Cancellato'].map(s=>`<option${s===p.stato?' selected':''}>${s}</option>`).join('')}
      </select></div>
      <div class="btns">
        <button class="btn btn-free" onclick="liberaTavolo('${id}')">Libera</button>
        <button class="btn btn-cancel" onclick="closeModal()">Annulla</button>
        <button class="btn btn-save" onclick="salvaMod('${id}')">Salva</button>
      </div>`;
  } else {
    body.innerHTML = `
      <div class="field"><label>Nome cliente *</label><input id="n-nome" placeholder="Es. Rossi Mario"></div>
      <div class="field"><label>Coperti *</label><input id="n-cop" type="number" min="1" max="${t.posti+2}" value="${t.posti}"></div>
      <div class="field"><label>Telefono</label><input id="n-tel" placeholder="333 1234567"></div>
      <div class="field"><label>Note</label><input id="n-note" placeholder="Allergie, seggiolone..."></div>
      <div class="btns">
        <button class="btn btn-cancel" onclick="closeModal()">Annulla</button>
        <button class="btn btn-save" onclick="prenota('${id}')">Prenota</button>
      </div>`;
  }
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function prenota(id) {
  const nome = document.getElementById('n-nome').value.trim();
  if(!nome){alert('Inserisci il nome');return;}
  if(!prenotazioni[turno]) prenotazioni[turno]={};
  prenotazioni[turno][id]={
    nome, coperti:parseInt(document.getElementById('n-cop').value),
    telefono:document.getElementById('n-tel').value,
    note:document.getElementById('n-note').value, stato:'Prenotato'
  };
  savePren(); closeModal(); render();
}

function salvaMod(id) {
  prenotazioni[turno][id]={...prenotazioni[turno][id],
    nome:document.getElementById('e-nome').value,
    coperti:parseInt(document.getElementById('e-cop').value),
    telefono:document.getElementById('e-tel').value,
    note:document.getElementById('e-note').value,
    stato:document.getElementById('e-stato').value
  };
  savePren(); closeModal(); render();
}

function liberaTavolo(id) {
  delete prenotazioni[turno][id];
  savePren(); closeModal(); render();
}

document.getElementById('modal').addEventListener('click', function(e){
  if(e.target===this) closeModal();
});

render();
</script>
</body>
</html>
